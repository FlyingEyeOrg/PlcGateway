name: Publish NuGet

# Request permissions required for Trusted Publishing via GitHub Actions OIDC
permissions:
  id-token: write
  contents: read
  packages: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Determine package version
        id: vars
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="${GITHUB_SHA::8}"
          fi
          # strip leading v if present
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore PlcGateway.sln

      - name: Build
        run: dotnet build PlcGateway.sln -c Release --no-restore

      - name: Pack PlcGateway
        run: |
          mkdir -p ./artifacts
          dotnet pack src/PlcGateway/PlcGateway.csproj -c Release -o ./artifacts \
            --no-build /p:PackageVersion=${{ steps.vars.outputs.version }} /p:IncludeSymbols=true /p:IncludeSource=true

      - name: Push to NuGet.org using Trusted Publishing
        run: |
          # When NuGet Trusted Publishing (GitHub Actions integration) is configured for this repository
          # nuget.org accepts the OIDC-provided identity and no API key is required.
          # Use dotnet to push; NuGet's backend will validate the workflow identity.
          dotnet nuget push "./artifacts/PlcGateway.${{ steps.vars.outputs.version }}.nupkg" -s https://api.nuget.org/v3/index.json --skip-duplicate
