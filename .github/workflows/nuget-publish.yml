name: Publish NuGet

# Request permissions required for Trusted Publishing via GitHub Actions OIDC
permissions:
  id-token: write
  contents: read

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: windows-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Determine package version
        id: vars
        shell: pwsh
        run: |
          [xml]$props = Get-Content .\src\PlcGateway\Directory.Build.props
          $baseVersion = $props.Project.PropertyGroup.PackageVersion

          if ($env:GITHUB_REF -like 'refs/tags/*') {
            $version = $env:GITHUB_REF.Substring(10)
          }
          else {
            $shortSha = $env:GITHUB_SHA.Substring(0, 8)
            $version = "$baseVersion-ci.$shortSha"
          }

          if ($version.StartsWith('v')) {
            $version = $version.Substring(1)
          }

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Restore
        run: dotnet restore PlcGateway.sln

      - name: Build
        run: dotnet build PlcGateway.sln -c Release --no-restore

      - name: Pack PlcGateway
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .\artifacts | Out-Null
          dotnet pack src/PlcGateway/PlcGateway.csproj -c Release -o .\artifacts `
            --no-build /p:PackageVersion=${{ steps.vars.outputs.version }} /p:IncludeSymbols=true /p:IncludeSource=true

      - name: NuGet login (OIDC -> temp API key)
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet.org using Trusted Publishing
        shell: pwsh
        run: |
          dotnet nuget push ".\artifacts\PlcGateway.${{ steps.vars.outputs.version }}.nupkg" -s https://api.nuget.org/v3/index.json --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --skip-duplicate
