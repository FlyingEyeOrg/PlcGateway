name: Publish NuGet

permissions:
  contents: read

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      package_version:
        description: 'Package version to publish when running manually (example: 1.0.3)'
        required: false
        type: string

jobs:
  publish:
    runs-on: windows-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Determine package version
        id: vars
        shell: pwsh
        run: |
          [xml]$props = Get-Content .\src\PlcGateway\Directory.Build.props
          $baseVersion = $props.Project.PropertyGroup.PackageVersion
          $manualVersion = "${{ inputs.package_version }}"

          if (-not [string]::IsNullOrWhiteSpace($manualVersion)) {
            $version = $manualVersion
          }
          elseif ($env:GITHUB_REF -like 'refs/tags/*') {
            $version = $env:GITHUB_REF.Substring(10)
          }
          else {
            $version = $baseVersion
          }

          if ($version.StartsWith('v')) {
            $version = $version.Substring(1)
          }

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Restore
        run: dotnet restore PlcGateway.sln

      - name: Build
        run: dotnet build PlcGateway.sln -c Release --no-restore

      - name: Pack PlcGateway
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .\artifacts | Out-Null
          dotnet pack src/PlcGateway/PlcGateway.csproj -c Release -o .\artifacts `
            --no-build /p:PackageVersion=${{ steps.vars.outputs.version }} /p:IncludeSymbols=true /p:IncludeSource=true

      - name: Push to NuGet.org using API key
        shell: pwsh
        run: |
          dotnet nuget push ".\artifacts\PlcGateway.${{ steps.vars.outputs.version }}.nupkg" -s https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate
